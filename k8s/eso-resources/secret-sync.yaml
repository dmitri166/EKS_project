apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flask-db-secret
  namespace: flask-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: flask-db-secret
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "postgresql://postgres:{{ .password | toString }}@{{ .host }}:5432/todoapp"
  data:
  - secretKey: password
    remoteRef:
      key: flask-devops-db-password
  - secretKey: host
    remoteRef:
      key: flask-devops-db-endpoint # I should check if this exists or if I need to add it
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-auth
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: redis-auth
    creationPolicy: Owner
  data:
  - secretKey: redis-password
    remoteRef:
      key: flask-devops-redis-password
