apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flask-db-secret
  namespace: flask-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: flask-db-secret
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "postgresql://postgres:{{ .password | toString }}@{{ .host }}:5432/todoapp"
  data:
  - secretKey: password
    remoteRef:
      key: flask-devops-db-password
  - secretKey: host
    remoteRef:
      key: flask-devops-db-endpoint # I should check if this exists or if I need to add it
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-auth
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: redis-auth
    creationPolicy: Owner
  data:
  - secretKey: redis-password
    remoteRef:
      key: flask-devops-redis-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-github
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-github
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: oauth2-proxy-github-client-id
    - secretKey: client-secret
      remoteRef:
        key: oauth2-proxy-github-client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: oauth2-proxy-cookie-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-db
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: backstage-db
    creationPolicy: Owner
    template:
      data:
        POSTGRES_HOST: "{{ .host | toString }}"
        POSTGRES_PORT: "5432"
        POSTGRES_USER: "postgres"
        POSTGRES_PASSWORD: "{{ .password | toString }}"
        POSTGRES_DB: "backstage"
  data:
    - secretKey: password
      remoteRef:
        key: flask-devops-backstage-db-password
    - secretKey: host
      remoteRef:
        key: flask-devops-backstage-db-endpoint
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
    template:
      data:
        admin-user: "admin"
        admin-password: "{{ .password | toString }}"
  data:
    - secretKey: password
      remoteRef:
        key: flask-devops-grafana-admin-password

