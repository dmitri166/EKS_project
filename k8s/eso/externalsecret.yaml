apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flask-db-secret
  namespace: flask-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: flask-db-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: flask-devops-db-url # This matches the secret name in AWS Secrets Manager
