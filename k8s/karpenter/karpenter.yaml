apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter
  namespace: karpenter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: karpenter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karpenter
        app.kubernetes.io/instance: karpenter
    spec:
      serviceAccountName: karpenter
      containers:
      - name: karpenter
        image: public.ecr.aws/karpenter/controller:v0.34.0@sha256:5c7bba0c6196a7c4f4c5a3387c5887c6b6e8c9d3b5a9a9c9d9e9f9a9a9c9d9e9f
        imagePullPolicy: IfNotPresent
        args:
        - --leader-elect
        - --log-level=info
        resources:
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        env:
        - name: AWS_DEFAULT_REGION
          value: us-east-1
        - name: CLUSTER_NAME
          value: flask-devops-cluster
        - name: KARPENTER_GIT_REPOSITORY
          value: https://github.com/dmitri166/EKS_project.git
        - name: KARPENTER_GIT_COMMIT
          value: HEAD
        - name: SYSTEM_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
      securityContext:
        fsGroup: 65534
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
      - key: karpenter.sh/controller
        operator: Exists
        effect: NoSchedule
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: karpenter
  namespace: karpenter
  annotations:
    iam.amazonaws.com/role: arn:aws:iam::025988852505:role/flask-devops-karpenter-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: karpenter
rules:
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/eviction"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["cordon", "drain", "uncordon"]
- apiGroups: ["karpenter.sh"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["karpenter.k8s.aws"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "update", "create"]
- apiGroups: ["apps"]
  resources: ["daemonsets", "deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["cronjobs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: karpenter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: karpenter
subjects:
- kind: ServiceAccount
  name: karpenter
  namespace: karpenter
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: karpenter-config
  namespace: karpenter
data:
  config.yaml: |
    settings:
      clusterName: flask-devops-cluster
      interruptionHandling: true
---
apiVersion: v1
kind: Service
metadata:
  name: karpenter
  namespace: karpenter
spec:
  selector:
    app.kubernetes.io/name: karpenter
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: metrics
