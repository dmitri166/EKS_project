apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: flask-app
  namespace: flask-app
  labels:
    app: flask-app
spec:
  replicas: 3
  strategy:
    canary:
      stableService: flask-app-stable
      canaryService: flask-app-canary
      trafficRouting:
        traefik:
          weightedTraefikServiceName: flask-app
      analysis:
        templates:
          - templateName: success-rate
          - templateName: latency
        args:
          - name: service-name
            value: flask-app-stable
        startingStep: 2
        interval: 5m
      steps:
        - setWeight: 20
        - pause: {duration: 5m}
        - setWeight: 50
        - pause: {duration: 5m}
        - setWeight: 100
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: 025988852505.dkr.ecr.us-east-1.amazonaws.com/flask-app:latest
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flask-db-secret
                  key: DATABASE_URL
            - name: REDIS_HOST
              value: redis-master.default.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app-stable
  namespace: flask-app
spec:
  type: ClusterIP
  selector:
    app: flask-app
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app-canary
  namespace: flask-app
spec:
  type: ClusterIP
  selector:
    app: flask-app
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: flask-app
  namespace: flask-app
spec:
  weighted:
    services:
      - name: flask-app-stable
        port: 80
        weight: 100
      - name: flask-app-canary
        port: 80
        weight: 0
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flask-app
  namespace: flask-app
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`api.eks-cluster-lab.duckdns.org`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: oauth2-proxy
        - name: rate-limit
      services:
        - name: flask-app
          kind: TraefikService
  tls:
    secretName: api-tls
