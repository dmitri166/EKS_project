apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://backstage.github.io/charts
    chart: backstage
    targetRevision: 0.26.0
    helm:
      values: |
        backstage:
          appConfig:
            app:
              title: EKS Lab Portal
              baseUrl: https://backstage.eks-cluster-lab.duckdns.org
            backend:
              baseUrl: https://backstage.eks-cluster-lab.duckdns.org
              cors:
                origin: https://backstage.eks-cluster-lab.duckdns.org
                methods: [GET, POST, PUT, PATCH, DELETE]
                credentials: true
              database:
                client: pg
                connection:
                  host: ${POSTGRES_HOST}
                  port: ${POSTGRES_PORT}
                  user: ${POSTGRES_USER}
                  password: ${POSTGRES_PASSWORD}
                  database: ${POSTGRES_DB}
          extraEnvVarsSecrets:
            - backstage-db
        postgresql:
          enabled: false
        ingress:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
