replicaCount: 2

image:
  repository: 025988852505.dkr.ecr.us-east-1.amazonaws.com/flask-app
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "5000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: false

resources:

  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 85

nodeSelector: {}
tolerations: []
affinity: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: flask-db-secret
        key: DATABASE_URL
  - name: REDIS_HOST
    value: redis-master.default.svc.cluster.local
  - name: REDIS_PORT
    value: "6379"

persistence:
  enabled: false

config:
  flaskDebug: "false"
  logLevel: "INFO"

serviceMonitor:
  enabled: true
  namespace: ""
  labels: {}
  interval: 30s
  scrapeTimeout: 10s

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""

networkPolicy:
  enabled: true
  ingress: []
  egress: []

rollout:
  enabled: false
  replicas: 2
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: {duration: 2m}
        - setWeight: 50
        - pause: {duration: 2m}
        - setWeight: 100
      analysis:
        enabled: true
        templates:
          - success-rate
          - latency
        startingStep: 1
  analysis:
    prometheusAddress: http://monitoring-prometheus.monitoring.svc.cluster.local:9090
    successRate:
      condition: "result[0] >= 0.95"
      failureLimit: 3
    latency:
      condition: "result[0] <= 0.5"
      failureLimit: 3
