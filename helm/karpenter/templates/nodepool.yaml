apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: {{ .Values.nodepool.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karpenter.labels" . | nindent 4 }}
spec:
  template:
    spec:
      taints:
      - key: karpenter.sh/controller
        value: "true"
        effect: NoSchedule
      startupTaints:
      - key: karpenter.sh/controller
        value: "true"
        effect: NoSchedule
      requirements:
      - key: kubernetes.io/arch
        operator: In
        values: ["amd64"]
      - key: kubernetes.io/os
        operator: In
        values: ["linux"]
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values: ["t"]
      - key: karpenter.k8s.aws/instance-generation
        operator: In
        values: ["3"]
      - key: karpenter.k8s.aws/instance-family
        operator: In
        values: ["t3", "t3a"]
      - key: karpenter.sh/capacity-type
        operator: In
        values: ["spot"]
      nodeClassRef:
        name: {{ .Values.ec2nodeclass.name }}
      kubeletConfiguration:
        maxPods: 58
  disruption:
    {{- toYaml .Values.nodepool.disruption | nindent 4 }}
  limits:
    {{- toYaml .Values.nodepool.limits | nindent 4 }}
